<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WISE Interactive Query — Global Water Insecurity Data</title>
  <meta name="description" content="Explore global water insecurity data by country. Filter by indicator, year, and demographic group on an interactive choropleth map." />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <!-- App CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ── Header ─────────────────────────────────────── -->
  <header class="app-header">
    <div class="header-brand">
      <div class="header-logo">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 3C16 3 6 13 6 19.5C6 25.299 10.701 30 16 30C21.299 30 26 25.299 26 19.5C26 13 16 3 16 3Z" fill="url(#dropGrad)"/>
          <defs>
            <linearGradient id="dropGrad" x1="16" y1="3" x2="16" y2="30" gradientUnits="userSpaceOnUse">
              <stop stop-color="#38bdf8"/>
              <stop offset="1" stop-color="#0369a1"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <div class="header-title-group">
        <h1 class="header-title">WISE</h1>
        <span class="header-subtitle">Water Insecurity Interactive Query</span>
      </div>
    </div>

    <div class="header-controls">
      <!-- Search -->
      <div class="search-wrapper" id="search-wrapper">
        <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
          <path fill-rule="evenodd" d="M9 3.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM2 9a7 7 0 1112.452 4.391l3.328 3.329a.75.75 0 11-1.06 1.06l-3.329-3.328A7 7 0 012 9z" clip-rule="evenodd"/>
        </svg>
        <input type="text" id="country-search" class="search-input" placeholder="Search country…" autocomplete="off" />
        <ul id="search-results" class="search-dropdown" role="listbox" aria-label="Country suggestions"></ul>
      </div>

      <!-- Filters -->
      <div class="filter-group">
        <div class="filter-item">
          <label class="filter-label" for="filter-indicator">Indicator</label>
          <select id="filter-indicator" class="filter-select">
            <option value="overall">Overall Index</option>
            <option value="access">Access</option>
            <option value="quality">Quality</option>
            <option value="affordability">Affordability</option>
          </select>
        </div>

        <div class="filter-item">
          <label class="filter-label" for="filter-year">Year</label>
          <select id="filter-year" class="filter-select">
            <option value="2023">2023</option>
            <option value="2022">2022</option>
            <option value="2021">2021</option>
            <option value="2020">2020</option>
            <option value="2019">2019</option>
            <option value="2018">2018</option>
            <option value="2017">2017</option>
            <option value="2016">2016</option>
            <option value="2015">2015</option>
          </select>
        </div>

        <div class="filter-item">
          <label class="filter-label" for="filter-demographic">Group</label>
          <select id="filter-demographic" class="filter-select">
            <option value="all">All households</option>
            <option value="urban">Urban</option>
            <option value="rural">Rural</option>
            <option value="women">Women</option>
            <option value="children">Children</option>
          </select>
        </div>
      </div>

      <button id="btn-export" class="btn-export" title="Download filtered data as CSV">
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path d="M10.75 2.75a.75.75 0 00-1.5 0v8.614L6.295 8.235a.75.75 0 10-1.09 1.03l4.25 4.5a.75.75 0 001.09 0l4.25-4.5a.75.75 0 00-1.09-1.03l-2.955 3.129V2.75z"/>
          <path d="M3.5 12.75a.75.75 0 00-1.5 0v2.5A2.75 2.75 0 004.75 18h10.5A2.75 2.75 0 0018 15.25v-2.5a.75.75 0 00-1.5 0v2.5c0 .69-.56 1.25-1.25 1.25H4.75c-.69 0-1.25-.56-1.25-1.25v-2.5z"/>
        </svg>
        Export CSV
      </button>
    </div>
  </header>

  <!-- ── Main Layout ─────────────────────────────────── -->
  <main class="app-main">

    <!-- Map -->
    <div id="map-container">
      <div id="map"></div>

      <!-- Loading overlay -->
      <div id="map-loading" class="map-loading">
        <div class="loading-spinner"></div>
        <p>Loading map data…</p>
      </div>

      <!-- Legend -->
      <div id="map-legend" class="map-legend">
        <div class="legend-title" id="legend-title">Overall Water Insecurity (%)</div>
        <div class="legend-scale" id="legend-scale"></div>
        <div class="legend-labels">
          <span>Low</span>
          <span>High</span>
        </div>
        <div class="legend-na"><span class="legend-na-swatch"></span> No data</div>
      </div>

      <!-- Tooltip -->
      <div id="map-tooltip" class="map-tooltip" style="display:none;"></div>
    </div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar sidebar--hidden">
      <button id="sidebar-close" class="sidebar-close" aria-label="Close panel">
        <svg viewBox="0 0 20 20" fill="currentColor">
          <path d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z"/>
        </svg>
      </button>

      <div class="sidebar-header">
        <div class="sidebar-flag" id="sidebar-flag"></div>
        <div>
          <h2 class="sidebar-country" id="sidebar-country">—</h2>
          <p class="sidebar-meta" id="sidebar-meta">Select a country to view details</p>
        </div>
      </div>

      <!-- Key metric -->
      <div class="metric-card">
        <div class="metric-label" id="metric-label">Overall Index</div>
        <div class="metric-value" id="metric-value">—</div>
        <div class="metric-sub" id="metric-sub"></div>
        <div class="metric-bar-track">
          <div class="metric-bar-fill" id="metric-bar"></div>
        </div>
      </div>

      <!-- Breakdown by demographic -->
      <div class="sidebar-section">
        <h3 class="section-title">Demographic Breakdown</h3>
        <div id="demo-bars" class="demo-bars"></div>
      </div>

      <!-- Trend chart -->
      <div class="sidebar-section">
        <h3 class="section-title">Trend Over Time</h3>
        <div class="chart-wrapper">
          <canvas id="trend-chart"></canvas>
        </div>
      </div>

      <!-- Indicator breakdown -->
      <div class="sidebar-section">
        <h3 class="section-title">Indicator Breakdown <span class="section-year" id="indicator-year"></span></h3>
        <div id="indicator-bars" class="demo-bars"></div>
      </div>
    </aside>
  </main>

  <!-- ── Scripts ─────────────────────────────────────── -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/map.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
